name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a
            comment or remove the **stale** label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-issue-reason: not_planned

          # Pull requests
          days-before-pr-stale: 90
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: >
            This pull request has been inactive for 90 days. It will be closed in
            14 days unless there is new activity. If you're still working on this,
            please leave a comment or push an update.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when ready.

          # Never mark these as stale
          exempt-issue-labels: 'pinned,security,bug,help-wanted'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          exempt-all-milestones: true

          operations-per-run: 100
